# Rime schema
# encoding: utf-8

schema:
  schema_id: pinyin
  name: 全键拼音
  version: "2026-05-02"
  description: |
    全键拼音 (融合雾凇拼音模糊音支持)
    https://github.com/iDvel/rime-ice
  dependencies:
    - english

switches:
  - name: ascii_mode
    states: [ 中, Ａ ]
  - name: ascii_punct
    states: [ ¥, ＄ ]
  - name: traditionalization
    states: [ 简, 繁 ]
  - name: emoji
    states: [ 💀, 😄 ]
    reset: 1
  - name: full_shape
    states: [ 半角, 全角 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - speller
    - punctuator
    - selector
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - echo_translator
    - script_translator
    - "table_translator@english"
    - "table_translator@cn_en"
  filters:
    - "simplifier@emoji"
    - "simplifier@traditionalize"
    - uniquifier

translator:
  dictionary: pinyin
  initial_quality: 1.2
  spelling_hints: 100
  always_show_comments: true
  comment_format:
    - xform/^/［/
    - xform/$/］/
  preedit_format:
    - xform/([jqxy])v/$1u/
    - xform/([nl])v/$1v/
    - xform/([nl])ue/$1ve/

english:
  dictionary: english
  enable_sentence: false
  enable_user_dict: false
  initial_quality: 1.1

cn_en:
  db_class: stabledb
  dictionary: ""
  enable_completion: true
  enable_sentence: false
  initial_quality: 0.5
  user_dict: "en_dicts/cn_en"

emoji:
  option_name: emoji
  opencc_config: emoji.json
  inherit_comment: false

traditionalize:
  option_name: traditionalization
  opencc_config: s2t.json

punctuator:
  symbols:
    "/": ["@", "＃", "＊", "＋", "……", "〜", "（", "）", "、", "/"]

recognizer:
  patterns:
    punct: "^/([0-9]|10|[A-Za-z]*?)$"

editor:
  bindings:
    space: confirm
    Return: commit_raw_input
    BackSpace: revert
    Delete: delete
    Escape: cancel

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA`"
  initials: "zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA"
  delimiter: " '"
  algebra:
    ### ====== 基础模糊音（fuzzy_basic，Simple 模式）=======
    ### in ↔ ing, en ↔ eng, an ↔ ang
    - "opt(fuzzy_basic): derive/en$/eng/"
    - "opt(fuzzy_basic): derive/eng$/en/"
    - "opt(fuzzy_basic): derive/in$/ing/"
    - "opt(fuzzy_basic): derive/ing$/in/"
    - "opt(fuzzy_basic): derive/an$/ang/"
    - "opt(fuzzy_basic): derive/ang$/an/"

    ### ====== 高级模糊音（fuzzy_advanced，Comprehensive 模式）=======
    ### 韵母扩展
    - "opt(fuzzy_advanced): derive/ian$/iang/"
    - "opt(fuzzy_advanced): derive/iang$/ian/"
    - "opt(fuzzy_advanced): derive/uan$/uang/"
    - "opt(fuzzy_advanced): derive/uang$/uan/"

    ### 声母模糊音 — zh↔z, ch↔c, sh↔s
    - "opt(fuzzy_advanced): derive/^zh/z/"
    - "opt(fuzzy_advanced): derive/^z/zh/"
    - "opt(fuzzy_advanced): derive/^([zcs])h/$1/"
    - "opt(fuzzy_advanced): derive/^([zcs])([^h])/$1h$2/"

    ### 声母模糊音 — n↔l, f↔h, r↔l
    - "opt(fuzzy_advanced): derive/^l/n/"
    - "opt(fuzzy_advanced): derive/^n/l/"
    - "opt(fuzzy_advanced): derive/^f/h/"
    - "opt(fuzzy_advanced): derive/^h/f/"
    - "opt(fuzzy_advanced): derive/^r/l/"
    - "opt(fuzzy_advanced): derive/^l/r/"

    ### 其他韵母模糊
    - "opt(fuzzy_advanced): derive/^([nl])ve$/$1ue/"
    - "opt(fuzzy_advanced): derive/^([jqxy])u/$1v/"

    ### ====== 始终启用的规则 ======
    ### v u 转换（不是模糊音，是输入习惯）
    - derive/^([nl])ue$/$1ve/
    - derive/^([jqxy])v/$1u/

    ### 超级简拼
    - erase/^hm$/
    - erase/^m$/
    - erase/^n$/
    - erase/^ng$/
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([zcs]h).+$/$1/

    ### 自动纠错（始终启用，纠正常见打字错误）
    - derive/^([wghk])ai$/$1ia/
    - derive/([wfghkz])ei$/$1ie/
    - derive/([jqx])ie$/$1ei/
    - derive/([rtypsdghklzcbnm])ao$/$1oa/
    - derive/([ypfm])ou$/$1uo/
    - derive/([wrtypsdfghklzcbnm])ang$/$1nag/
    - derive/([wrtypsdfghklzcbnm])ang$/$1agn/
    - derive/([wrtpsdfghklzcbnm])eng$/$1neg/
    - derive/([wrtpsdfghklzcbnm])eng$/$1egn/
    - derive/([qtypdjlxbnm])ing$/$1nig/
    - derive/([qtypdjlxbnm])ing$/$1ign/
    - derive/([rtysdghklzcn])ong$/$1nog/
    - derive/([rtysdghklzcn])ong$/$1ogn/
    - derive/([qtpdjlxbnm])iao$/$1ioa/
    - derive/([qtpdjlxbnm])iao$/$1oia/
    - derive/([rtsghkzc])ui$/$1iu/
    - derive/([qjlxnm])iu$/$1ui/
    - derive/([qjlxn])iang$/$1aing/
    - derive/([qjlxn])iang$/$1inag/
    - derive/([g|h|k|zh|sh])ua$/$1au/
    - derive/([g|h|k|zh|ch|sh])uai$/$1aui/
    - derive/([qrtysdghjklzxcn])uan$/$1aun/
    - derive/([nlyjqx])ue$/$1eu/
    - derive/([g|h|k|zh|ch|sh])uang$/$1aung/
    - derive/([g|h|k|zh|ch|sh])uang$/$1uagn/
    - derive/([g|h|k|zh|ch|sh])uang$/$1unag/
    - derive/([g|h|k|zh|ch|sh])uang$/$1augn/
    - derive/([jqx])iong$/$1inog/
    - derive/([jqx])iong$/$1oing/
    - derive/([jqx])iong$/$1iogn/
    - derive/([jqx])iong$/$1oign/
    - derive/([rtsdghkzc])o(u|ng)$/$1o/
    - derive/(.+)ong$/$1on/
    - derive/([tl])eng$/$1en/
    - derive/([qwrtypsdfghjklzxcbnm])([aeio])ng$/$1ng/
